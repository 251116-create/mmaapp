<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐷 돼지파티 💕</title>
    <style>
        /* ===== 기본 스타일 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            color: #5a3a5a;
            /* 러블리 파스텔 그라데이션 배경 */
            background: linear-gradient(135deg, #ffd6e8 0%, #e8d5ff 50%, #d5e8ff 100%);
            overflow: hidden;
        }

        /* 배경에 반짝이는 별 애니메이션 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.9), transparent),
                radial-gradient(2px 2px at 60% 70%, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,0.9), transparent),
                radial-gradient(2px 2px at 30% 80%, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 15% 60%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 50% 40%, rgba(255,255,255,0.9), transparent);
            background-size: 200% 200%;
            animation: twinkle 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.6; background-position: 0% 0%; }
            50% { opacity: 1; background-position: 100% 100%; }
        }

        .container {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 2;
        }

        /* ===== 왼쪽 패널: 글래스모피즘 ===== */
        .left-panel {
            width: 420px;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 8px 0 30px rgba(255, 180, 220, 0.3);
            border-right: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* ===== 헤더 ===== */
        .header {
            padding: 28px 24px;
            background: linear-gradient(135deg, #ffb3d9 0%, #d9b3ff 100%);
            position: relative;
            overflow: hidden;
        }

        /* 헤더 안에서 반짝이는 별 */
        .header::before {
            content: '✨';
            position: absolute;
            top: 12px;
            right: 20px;
            font-size: 20px;
            animation: sparkle 2s ease-in-out infinite;
        }

        .header::after {
            content: '✨';
            position: absolute;
            bottom: 14px;
            left: 30px;
            font-size: 14px;
            animation: sparkle 2.5s ease-in-out infinite 0.5s;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
        }

        .header h1 {
            font-size: 24px;
            color: #fff;
            font-weight: 800;
            text-shadow: 0 2px 8px rgba(255, 105, 180, 0.4);
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header .subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.95);
            margin-top: 6px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* ===== 탭 메뉴 ===== */
        .tab-menu {
            display: flex;
            background: rgba(255, 255, 255, 0.4);
            padding: 12px;
            gap: 8px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 6px;
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid transparent;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: #b888b8;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(255, 180, 220, 0.2);
            line-height: 1.3;
        }

        .tab-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 180, 220, 0.4);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ff9ec7 0%, #c9a0ff 100%);
            color: #fff;
            border-color: #fff;
            box-shadow: 0 4px 16px rgba(255, 158, 199, 0.5);
            transform: translateY(-1px);
        }

        /* ===== 검색창 ===== */
        .search-box {
            padding: 16px 20px 20px;
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.3);
        }

        .search-box input {
            flex: 1;
            padding: 14px 18px;
            font-size: 14px;
            border: 2px solid rgba(255, 200, 230, 0.6);
            border-radius: 24px;
            outline: none;
            background: rgba(255, 255, 255, 0.85);
            transition: all 0.3s;
            box-shadow: inset 0 2px 6px rgba(255, 180, 220, 0.1);
        }

        .search-box input::placeholder {
            color: #d4a8d4;
        }

        .search-box input:focus {
            border-color: #ff9ec7;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255, 158, 199, 0.2);
        }

        .search-box button {
            padding: 0 22px;
            background: linear-gradient(135deg, #ff9ec7 0%, #c9a0ff 100%);
            color: #fff;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 4px 14px rgba(255, 158, 199, 0.5);
            transition: all 0.3s;
        }

        .search-box button:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 6px 20px rgba(255, 158, 199, 0.6);
        }

        .search-box button:active {
            transform: translateY(0) scale(0.98);
        }

        /* ===== 결과 리스트 ===== */
        .result-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px 20px;
        }

        /* 스크롤바 커스텀 */
        .result-list::-webkit-scrollbar {
            width: 6px;
        }
        .result-list::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #ff9ec7, #c9a0ff);
            border-radius: 10px;
        }
        .result-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .empty-msg {
            text-align: center;
            color: #c490c4;
            margin-top: 60px;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.8;
        }

        .empty-msg .big {
            font-size: 40px;
            display: block;
            margin-bottom: 12px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .result-item {
            padding: 16px 18px;
            margin-bottom: 12px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.85);
            border: 1.5px solid rgba(255, 200, 230, 0.5);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 10px rgba(255, 180, 220, 0.15);
            position: relative;
            overflow: hidden;
        }

        /* 호버 시 반짝이는 광택 효과 */
        .result-item::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.5) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .result-item:hover {
            transform: translateY(-3px);
            border-color: #ff9ec7;
            box-shadow: 0 8px 24px rgba(255, 158, 199, 0.35);
        }

        .result-item:hover::before {
            transform: translateX(100%);
        }

        .result-item .name {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 6px;
            color: #6a3a6a;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .result-item .number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            background: linear-gradient(135deg, #ff9ec7, #c9a0ff);
            color: #fff;
            border-radius: 50%;
            font-size: 11px;
            font-weight: 700;
        }

        .result-item .address {
            font-size: 12.5px;
            color: #a070a0;
            line-height: 1.5;
            padding-left: 30px;
        }

        /* ===== 오른쪽 패널: 지도 ===== */
        .right-panel {
            flex: 1;
            position: relative;
            padding: 16px;
        }

        #map {
            width: 100%;
            height: 100%;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(180, 130, 200, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.6);
        }

        /* ===== 이모지 마커 ===== */
        .emoji-marker {
            font-size: 36px;
            cursor: pointer;
            filter: drop-shadow(2px 4px 6px rgba(180, 100, 180, 0.4));
            transition: transform 0.2s;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .emoji-marker:hover {
            transform: scale(1.3) translateY(-4px);
        }

        /* ===== 커스텀 말풍선 공통 ===== */
        .custom-bubble {
            position: relative;
            min-width: 230px;
            padding: 18px 20px;
            border-radius: 20px;
            box-shadow: 0 12px 32px rgba(180, 100, 180, 0.3);
            font-size: 13px;
            line-height: 1.5;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.7) translateY(10px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* 말풍선 꼬리 */
        .custom-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
        }

        .custom-bubble .close-btn {
            position: absolute;
            top: 10px;
            right: 14px;
            background: rgba(255, 255, 255, 0.7);
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .custom-bubble .close-btn:hover {
            background: #fff;
            transform: rotate(90deg);
        }

        .custom-bubble .title {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 10px;
            padding-right: 28px;
        }

        .custom-bubble .info {
            font-size: 12px;
            color: #555;
            margin-bottom: 4px;
        }

        .custom-bubble .link {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .custom-bubble .link:hover {
            transform: translateY(-1px);
        }

        /* ===== 만찬후보(음식점): 접시 느낌 ===== */
        .bubble-food {
            background: linear-gradient(180deg, #fff5fa 0%, #ffe0ee 100%);
            border: 3px solid #ffb3d1;
            border-radius: 60px 60px 60px 60px / 40px 40px 40px 40px;
        }

        .bubble-food::before {
            content: '';
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 2px dashed #ff9ec7;
            border-radius: 55px 55px 55px 55px / 35px 35px 35px 35px;
            pointer-events: none;
        }

        .bubble-food::after { border-top: 12px solid #ffb3d1; }
        .bubble-food .title { color: #c2185b; }
        .bubble-food .link { background: #ff9ec7; color: #fff; }

        /* ===== 디저트(카페): 케이크 느낌 ===== */
        .bubble-cafe {
            background: linear-gradient(180deg, #fff0fa 0%, #ffe0f5 50%, #ffd0ec 100%);
            border: 3px solid #ff9ec7;
            border-radius: 16px 16px 12px 12px;
        }

        /* 케이크 위 토핑 데코 */
        .bubble-cafe::before {
            content: '🍒  🍓  🧁  🍓  🍒';
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            letter-spacing: 4px;
            white-space: nowrap;
        }

        .bubble-cafe::after { border-top: 12px solid #ff9ec7; }
        .bubble-cafe .title { color: #c2185b; }
        .bubble-cafe .link { background: linear-gradient(135deg, #ff9ec7, #c9a0ff); color: #fff; }

        /* ===== 소화제(약국): 약봉투 느낌 (파스텔 라벤더) ===== */
        .bubble-pharmacy {
            background: linear-gradient(180deg, #f0e5ff 0%, #e0d0ff 100%);
            border: 2px solid #b89aff;
            border-radius: 8px;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 22px, rgba(184,154,255,0.15) 22px, rgba(184,154,255,0.15) 23px);
            padding-top: 32px;
        }

        .bubble-pharmacy::before {
            content: '✚  처  방  전  ✚';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(90deg, #b89aff, #9a7aff);
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            padding: 5px 0;
            text-align: center;
            letter-spacing: 3px;
            border-radius: 6px 6px 0 0;
        }

        .bubble-pharmacy::after { border-top: 12px solid #b89aff; }
        .bubble-pharmacy .title { color: #5a3a8a; }
        .bubble-pharmacy .link { background: #b89aff; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <div class="header">
            <h1>🐷 돼지파티 💕</h1>
            <div class="subtitle">✨ 오늘 어디서 먹고 마실까? ✨</div>
        </div>

        <!-- 카테고리 탭 -->
        <div class="tab-menu">
            <button class="tab-btn active" data-category="FD6">🍽️ 만찬후보</button>
            <button class="tab-btn" data-category="CE7">🧁 디저트</button>
            <button class="tab-btn" data-category="PM9">💊 소화제<br>필요하다면?</button>
        </div>

        <div class="search-box">
            <input type="text" id="keyword" placeholder="💖 어디로 갈까? (예: 강남역)">
            <button id="searchBtn">검색 ✨</button>
        </div>

        <div class="result-list" id="resultList">
            <div class="empty-msg">
                <span class="big">🐷💖</span>
                탭을 선택하고<br>
                지역을 검색해 보세요!
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div id="map"></div>
    </div>
</div>

<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=62f299f531462c017c117f8f64adc1e2&libraries=services&autoload=false"></script>

<script>
    // ===== 전역 변수 =====
    let map;
    let placeSearch;
    let overlays = [];        // 이모지 마커 보관
    let bubbleOverlay = null; // 현재 열려있는 말풍선

    // 현재 선택된 카테고리 (기본: 만찬후보)
    let currentCategory = 'FD6';

    // 카테고리별 설정 (이모지 마커 + 말풍선 테마 + 카테고리명)
    const categoryConfig = {
        FD6: { emoji: '🍽️', bubbleClass: 'bubble-food', name: '음식점' },
        CE7: { emoji: '🧁', bubbleClass: 'bubble-cafe', name: '카페' },
        PM9: { emoji: '💊', bubbleClass: 'bubble-pharmacy', name: '약국' }
    };

    // ===== SDK 로드 완료 후 초기화 =====
    kakao.maps.load(() => {
        const container = document.getElementById('map');
        const options = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567),
            level: 3
        };
        map = new kakao.maps.Map(container, options);
        placeSearch = new kakao.maps.services.Places();

        // 검색 이벤트
        document.getElementById('searchBtn').addEventListener('click', searchPlaces);
        document.getElementById('keyword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchPlaces();
        });

        // 지도 클릭 시 말풍선 닫기
        kakao.maps.event.addListener(map, 'click', closeBubble);

        // 탭 클릭 이벤트
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                currentCategory = btn.dataset.category;

                clearAll();
                if (document.getElementById('keyword').value.trim()) {
                    searchPlaces();
                } else {
                    document.getElementById('resultList').innerHTML = `
                        <div class="empty-msg">
                            <span class="big">🐷💖</span>
                            지역을 입력해<br>
                            검색해 보세요!
                        </div>
                    `;
                }
            });
        });
    });

    // ===== 검색 함수 =====
    function searchPlaces() {
        const keyword = document.getElementById('keyword').value.trim();
        if (!keyword) {
            alert('어디로 갈지 입력해 주세요! 💕');
            return;
        }

        // 키워드에 카테고리명을 붙여서 검색 정확도 향상
        const query = `${keyword} ${categoryConfig[currentCategory].name}`;

        placeSearch.keywordSearch(query, (data, status) => {
            if (status === kakao.maps.services.Status.OK) {
                // 해당 카테고리만 필터링
                const filtered = data.filter(p => p.category_group_code === currentCategory);
                if (filtered.length === 0) {
                    document.getElementById('resultList').innerHTML = `
                        <div class="empty-msg">
                            <span class="big">🥲</span>
                            해당 카테고리 결과가<br>
                            없어요...
                        </div>
                    `;
                    clearAll();
                    return;
                }
                displayPlaces(filtered);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 없어요 🥲');
                clearAll();
            } else {
                alert('검색 도중 오류가 발생했어요 😢');
            }
        });
    }

    // ===== 결과 표시 =====
    function displayPlaces(places) {
        const listEl = document.getElementById('resultList');
        const bounds = new kakao.maps.LatLngBounds();

        clearAll();
        listEl.innerHTML = '';

        places.forEach((place, index) => {
            const position = new kakao.maps.LatLng(place.y, place.x);

            // 1) 이모지 마커 생성
            const emojiMarker = createEmojiMarker(position, place);
            emojiMarker.setMap(map);
            overlays.push(emojiMarker);

            // 2) 결과 리스트 아이템
            const itemEl = document.createElement('div');
            itemEl.className = 'result-item';
            itemEl.innerHTML = `
                <div class="name">
                    <span class="number">${index + 1}</span>
                    ${place.place_name}
                </div>
                <div class="address">${place.road_address_name || place.address_name}</div>
            `;

            itemEl.addEventListener('click', () => {
                map.panTo(position);
                showBubble(position, place);
            });

            listEl.appendChild(itemEl);
            bounds.extend(position);
        });

        map.setBounds(bounds);
    }

    // ===== 이모지 마커 생성 =====
    function createEmojiMarker(position, place) {
        const content = document.createElement('div');
        content.className = 'emoji-marker';
        content.innerHTML = categoryConfig[currentCategory].emoji;

        const overlay = new kakao.maps.CustomOverlay({
            position: position,
            content: content,
            yAnchor: 1
        });

        content.addEventListener('click', () => {
            showBubble(position, place);
        });

        return overlay;
    }

    // ===== 커스텀 말풍선 표시 =====
    function showBubble(position, place) {
        closeBubble();

        const bubbleClass = categoryConfig[currentCategory].bubbleClass;

        const wrapper = document.createElement('div');
        wrapper.className = `custom-bubble ${bubbleClass}`;
        wrapper.innerHTML = `
            <button class="close-btn">×</button>
            <div class="title">${place.place_name}</div>
            <div class="info">📞 ${place.phone || '번호 없음'}</div>
            <div class="info">🏠 ${place.road_address_name || place.address_name}</div>
            <a class="link" href="${place.place_url}" target="_blank">카카오맵 상세 보기 →</a>
        `;

        wrapper.querySelector('.close-btn').addEventListener('click', closeBubble);

        bubbleOverlay = new kakao.maps.CustomOverlay({
            position: position,
            content: wrapper,
            yAnchor: 1.4,
            xAnchor: 0.5,
            zIndex: 100
        });
        bubbleOverlay.setMap(map);
    }

    // ===== 말풍선 닫기 =====
    function closeBubble() {
        if (bubbleOverlay) {
            bubbleOverlay.setMap(null);
            bubbleOverlay = null;
        }
    }

    // ===== 모든 마커 제거 =====
    function clearAll() {
        overlays.forEach(o => o.setMap(null));
        overlays = [];
        closeBubble();
    }
</script>

</body>
</html>
